<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RC Validator / RC 검증기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@600;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f5ee;--sur:#fff;--brd:#ddd5c0;--brd2:#c8bb9e;
  --txt:#111;--mut:#5a5040;
  --acc:#2656b8;--tel:#0a7a5f;
  --red:#b52a1e;--amb:#a06000;--grn:#0a7a5f;
  --ai:#1a0a3c;--ai-sur:#f0ecff;--ai-brd:#c5b8f0;
  --rbg:rgba(181,42,30,.11);--abg:rgba(160,96,0,.11);--gbg:rgba(10,122,95,.11);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:15px;line-height:1.65}
#root{height:100%}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;overflow:hidden}
/* ── Header: title row + mode row ── */
.hdr{background:var(--sur);border-bottom:2px solid var(--brd);flex-shrink:0}
.hdr-row1{padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-row2{padding:0 20px 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hdr-left h1{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#000}
.hdr-left p{color:var(--mut);font-size:12px;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.mode-toggle{display:flex;border:1.5px solid var(--brd2);border-radius:8px;overflow:hidden}
.mode-btn{background:transparent;border:none;border-right:1px solid var(--brd2);padding:6px 16px;font-size:13px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;color:var(--mut);transition:all .15s;white-space:nowrap}
.mode-btn:last-child{border-right:none}
.mode-btn:hover{color:var(--txt);background:rgba(0,0,0,.04)}
.mode-btn.active{background:var(--acc);color:#fff}
.mode-btn.active-rel{background:#1a0a3c;color:#e8deff}
.lang-btn{background:var(--bg);border:1.5px solid var(--brd2);border-radius:6px;padding:5px 12px;font-size:13px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;color:var(--mut);transition:all .15s}
.lang-btn:hover{border-color:var(--acc);color:var(--acc)}
.lang-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.tag{background:var(--acc);color:#fff;font-size:11px;padding:3px 10px;border-radius:99px;font-family:'Syne',sans-serif;font-weight:700}
.key-btn{background:var(--bg);border:1.5px solid var(--brd2);border-radius:6px;padding:5px 12px;font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:600;cursor:pointer;transition:all .2s}
.key-btn:hover{border-color:var(--tel)}
/* ── Layout ── */
.main{display:grid;grid-template-columns:420px 1fr;overflow:hidden}
.left{overflow-y:auto;padding:16px;background:var(--bg);border-right:2px solid var(--brd)}
.right{overflow-y:auto;padding:20px;background:var(--sur)}
.sec{margin-bottom:20px}
.sec-lbl{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:.1em;color:#444;text-transform:uppercase;margin-bottom:9px;display:block}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:12px;color:#444;font-weight:500}
input[type=number],input[type=text],select{background:#fff;border:1.5px solid var(--brd2);border-radius:6px;padding:7px 10px;font-size:14px;color:#111;font-family:'IBM Plex Mono',monospace;width:100%}
input:focus,select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(38,86,184,.1)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:5px}
.chip{background:#fff;border:1.5px solid var(--brd2);border-radius:7px;padding:6px 11px;font-size:13px;color:#444;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s}
.chip:hover{border-color:var(--acc);color:#111}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
.chip.teal.on{background:var(--tel);border-color:var(--tel);color:#fff;font-weight:600}
.cat{font-size:12px;color:#555;width:100%;margin:6px 0 4px;font-weight:700}
.eg-btn{width:100%;padding:9px 11px;background:#fff;border:1.5px solid var(--brd2);border-radius:7px;color:#444;font-size:13px;cursor:pointer;margin-bottom:6px;font-family:'IBM Plex Mono',monospace;text-align:left;transition:all .15s}
.eg-btn:hover{border-color:var(--tel);color:#111;background:rgba(10,122,95,.05)}
.adv-hdr{cursor:pointer;display:flex;align-items:center;gap:7px;color:#555;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:4px 0;margin-bottom:7px;user-select:none}
.adv-hdr:hover{color:#111}
.adv-arr{display:inline-block;transition:transform .2s;font-size:9px}
.adv-arr.open{transform:rotate(90deg)}
.chk-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;cursor:pointer;color:#222}
.chk-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--acc);flex-shrink:0}
.chk-item.crit{color:#7a1010}
.bdg{font-size:10px;padding:2px 7px;border-radius:3px;flex-shrink:0;font-weight:700}
.bdg.crit{background:var(--rbg);color:var(--red)}.bdg.std{background:var(--abg);color:var(--amb)}
.run{width:100%;padding:13px;background:var(--acc);border:none;border-radius:9px;color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:.05em;cursor:pointer;transition:all .2s;margin-top:8px}
.run:hover{background:#1e44a0;transform:translateY(-1px);box-shadow:0 4px 14px rgba(38,86,184,.3)}
.calc-run{background:#1a0a3c!important}.calc-run:hover{background:#2a1454!important}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--mut);gap:14px;text-align:center}
.sum-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.sum-card{background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:15px;text-align:center}
.sum-card.r{border-color:rgba(181,42,30,.55);background:var(--rbg)}
.sum-card.a{border-color:rgba(160,96,0,.45);background:var(--abg)}
.sum-card.g{border-color:rgba(10,122,95,.45);background:var(--gbg)}
.sum-n{font-family:'Syne',sans-serif;font-weight:800;font-size:34px}
.sum-card.r .sum-n{color:var(--red)}.sum-card.a .sum-n{color:var(--amb)}.sum-card.g .sum-n{color:var(--grn)}
.sum-lbl{font-size:12px;color:#555;margin-top:4px;font-weight:600}
.rsec{margin-bottom:22px}
.rtitle{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:.1em;color:#444;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:9px}
.rcnt{background:var(--brd2);border-radius:99px;padding:2px 10px;font-size:12px;color:#111;font-weight:700}
.card{background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:14px;margin-bottom:10px}
.card.fail{border-color:rgba(181,42,30,.55);background:rgba(181,42,30,.04)}
.card.warning{border-color:rgba(160,96,0,.45);background:rgba(160,96,0,.04)}
.card.pass{border-color:rgba(10,122,95,.3);background:rgba(10,122,95,.03)}
.card.mc,.card.ms{border-color:rgba(181,42,30,.5);background:rgba(181,42,30,.04)}
.chdr{display:flex;justify-content:space-between;align-items:flex-start;gap:9px;margin-bottom:8px}
.ctitle{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#000}
.sev{font-size:11px;padding:3px 9px;border-radius:3px;font-weight:800;flex-shrink:0;font-family:'Syne',sans-serif}
.sev.cr{background:var(--rbg);color:var(--red);border:1.5px solid rgba(181,42,30,.3)}
.sev.st{background:var(--abg);color:var(--amb);border:1.5px solid rgba(160,96,0,.3)}
.sev.ok{background:var(--gbg);color:var(--grn);border:1.5px solid rgba(10,122,95,.25)}
.sev.ad{background:rgba(38,86,184,.1);color:var(--acc);border:1.5px solid rgba(38,86,184,.3)}
.delta{display:flex;align-items:center;gap:9px;margin:8px 0;font-size:13px;flex-wrap:wrap}
.dg{color:var(--red);background:var(--rbg);padding:3px 10px;border-radius:4px;font-weight:600}
.dr{color:var(--grn);background:var(--gbg);padding:3px 10px;border-radius:4px;font-weight:600}
.cref{font-size:12px;color:var(--acc);margin:5px 0;font-style:italic;font-weight:600}
.expl{font-size:13px;color:#333;line-height:1.65;margin:5px 0}
.fix{font-size:13px;color:#111;margin-top:8px;padding:8px 11px;background:#fff;border-radius:5px;border-left:3px solid var(--acc);font-weight:500}
.src-btn{background:transparent;border:none;color:#666;font-size:12px;cursor:pointer;padding:4px 0;font-family:'IBM Plex Mono',monospace;text-decoration:underline}
.src-btn:hover{color:#111}
.src-txt{font-size:12px;color:#444;padding:8px 11px;border-left:2px solid var(--brd2);margin-top:5px;line-height:1.7;font-style:italic}
.pass-btn{background:transparent;border:none;color:var(--grn);font-size:13px;cursor:pointer;font-family:'IBM Plex Mono',monospace;padding:5px 0;display:flex;align-items:center;gap:8px;margin-bottom:9px;font-weight:600}
.disc{font-size:12px;color:#555;padding:13px;background:var(--bg);border:1.5px solid var(--brd);border-radius:7px;line-height:1.7;margin-top:16px}
.stat-bar{font-size:12px;color:#444;padding:8px 13px;background:var(--bg);border-radius:5px;border-left:3px solid var(--brd2);margin-bottom:16px;font-weight:500}
/* Diagram */
.diag-wrap{background:var(--bg);border:1.5px solid var(--brd);border-radius:11px;padding:18px;margin-bottom:20px}
.diag-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;color:#222;text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.diag-badge{font-size:11px;font-weight:600;color:var(--mut);font-family:'IBM Plex Mono',monospace;background:var(--sur);border:1px solid var(--brd2);padding:2px 9px;border-radius:4px}
.diag-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:#333;font-weight:500}
.diag-legend span{display:inline-flex;align-items:center;gap:6px}
.leg-dot{width:13px;height:13px;border-radius:3px;display:inline-block;flex-shrink:0}
.leg-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--brd);color:#444;font-weight:700;margin-left:2px;font-family:'Syne',sans-serif;text-transform:uppercase}
.diag-note{font-size:12px;color:#555;margin-top:9px;line-height:1.6}
/* Load inputs */
.load-inputs{background:#f0f4ff;border:1.5px solid rgba(38,86,184,.2);border-radius:9px;padding:14px;margin-bottom:18px}
/* Calc sheet */
.calc-summary{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;margin-bottom:18px;align-items:center}
.cs-sum-card{background:var(--bg);border:1.5px solid var(--brd);border-radius:8px;padding:12px;text-align:center}
.cs-sum-card.pass{border-color:rgba(10,122,95,.4);background:var(--gbg)}
.cs-sum-card.fail{border-color:rgba(181,42,30,.4);background:var(--rbg)}
.cs-sum-n{font-family:'Syne',sans-serif;font-weight:800;font-size:28px}
.cs-sum-lbl{font-size:11px;color:#555;margin-top:3px}
.print-btn{background:var(--sur);border:1.5px solid var(--brd2);border-radius:7px;padding:10px 14px;font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:600;cursor:pointer;white-space:nowrap;color:#333}
.print-btn:hover{border-color:var(--acc);color:var(--acc)}
.calc-sheet{border:1.5px solid var(--brd);border-radius:10px;margin-bottom:14px;overflow:hidden}
.calc-sheet.cs-pass{border-color:rgba(10,122,95,.35)}.calc-sheet.cs-fail{border-color:rgba(181,42,30,.45)}
.cs-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;background:var(--bg);user-select:none}
.cs-hdr:hover{background:#f0ede6}
.cs-title{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#111}
.cs-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.cs-icon.ok{background:var(--gbg);color:var(--grn);border:1.5px solid rgba(10,122,95,.3)}
.cs-icon.fail{background:var(--rbg);color:var(--red);border:1.5px solid rgba(181,42,30,.3)}
.cs-toggle{font-size:10px;color:#888}
.cs-body{padding:14px 16px;border-top:1px solid var(--brd)}
.cs-warn{background:#fff8e7;border:1.5px solid rgba(160,96,0,.3);border-radius:6px;padding:8px 12px;font-size:12px;color:#7a4f00;margin-bottom:12px}
.dcr-badge{font-size:11px;font-family:'Syne',sans-serif;font-weight:800;padding:3px 10px;border-radius:4px}
.dcr-badge.good{background:var(--gbg);color:var(--grn)}.dcr-badge.warn{background:var(--abg);color:var(--amb)}.dcr-badge.bad{background:var(--rbg);color:var(--red)}
.dcr-card{border:1.5px solid var(--brd);border-radius:8px;padding:12px;margin-bottom:14px;background:var(--bg)}
.dcr-label{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:#444;margin-bottom:5px}
.dcr-nums{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px;font-weight:600}
.dcr-demand{color:#333}.dcr-slash{color:#aaa}.dcr-cap{color:#555}
.dcr-bar-bg{height:10px;background:#e8e0d0;border-radius:5px;position:relative;overflow:hidden;margin-bottom:5px}
.dcr-bar-fill{height:100%;border-radius:5px;transition:width .4s}
.dcr-bar-limit{position:absolute;right:0;top:0;width:1px;height:100%;background:#bbb}
.dcr-val{font-size:12px;font-weight:700}
.cs-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.cs-table th{background:#1a0a3c;color:#e8deff;padding:7px 10px;text-align:left;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.05em}
.cs-table td{padding:6px 10px;border-bottom:1px solid var(--brd);vertical-align:top;line-height:1.5}
.cs-row-alt td{background:#faf7f0}
.cs-param{font-weight:600;color:#222;width:22%}.cs-formula{font-family:'IBM Plex Mono',monospace;color:#2656b8;width:28%}
.cs-sub{font-family:'IBM Plex Mono',monospace;color:#555;font-size:11px;width:28%}
.cs-val{font-weight:700;color:#111;text-align:right;width:12%}.cs-unit{color:#888;font-size:11px;width:10%;padding-left:4px}
.nm-wrap{background:var(--bg);border:1.5px solid var(--brd);border-radius:10px;padding:16px;margin-bottom:16px}
.nm-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
/* AI */
.ai-explain-btn{margin-top:10px;background:var(--ai-sur);border:1.5px solid var(--ai-brd);border-radius:7px;padding:7px 14px;font-size:12px;color:#3d1a8a;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .15s;display:block;width:100%;text-align:left;font-weight:600}
.ai-explain-btn:hover{background:#e5deff;border-color:#9370e8}
.ai-loading{display:flex;align-items:center;gap:9px;color:#555;font-size:12px;padding:8px 0;margin-top:8px}
.ai-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--ai-brd);border-top-color:#7c4dff;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-answer{background:var(--ai-sur);border:1.5px solid var(--ai-brd);border-radius:8px;padding:13px;margin-top:10px}
.ai-answer.ai-error{background:#fff5f5;border-color:var(--red)}
.ai-answer-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#7c4dff;margin-bottom:7px}
.ai-answer-body{font-size:13px;color:#222;line-height:1.75;white-space:pre-wrap}
.ai-reset-btn{background:transparent;border:none;font-size:11px;color:#888;cursor:pointer;margin-top:8px;font-family:'IBM Plex Mono',monospace}
.chat-wrap{border:1.5px solid var(--ai-brd);border-radius:11px;background:var(--ai-sur);margin-top:20px;overflow:hidden}
.chat-hdr{background:var(--ai);color:#e8deff;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.chat-hdr:hover{background:#2a1454}
.chat-toggle{font-size:10px;opacity:.7}
.chat-body{display:flex;flex-direction:column}
.chat-empty{padding:18px 16px}
.chat-empty-msg{font-size:13px;color:#555;margin-bottom:12px;line-height:1.6}
.chat-suggestions{display:flex;flex-direction:column;gap:6px}
.chat-sug{background:#fff;border:1.5px solid var(--ai-brd);border-radius:7px;padding:8px 12px;font-size:12px;color:#3d1a8a;cursor:pointer;text-align:left;font-family:'IBM Plex Mono',monospace;transition:all .15s}
.chat-sug:hover{background:#e5deff;border-color:#9370e8}
.chat-msg{display:flex;gap:10px;padding:12px 16px;border-top:1px solid #e8e0ff;align-items:flex-start}
.chat-msg.user{flex-direction:row-reverse;background:#fff}
.chat-msg.assistant{background:var(--ai-sur)}
.chat-role-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.chat-text{font-size:13px;line-height:1.75;color:#1a1030;white-space:pre-wrap;flex:1}
.chat-msg.user .chat-text{color:#111;text-align:right}
.chat-thinking{color:#888;display:flex;align-items:center;gap:8px}
.chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:2px solid var(--ai-brd);background:#fff}
.chat-input{flex:1;background:var(--ai-sur);border:1.5px solid var(--ai-brd);border-radius:7px;padding:9px 12px;font-size:13px;color:#111;font-family:'IBM Plex Mono',monospace}
.chat-input:focus{outline:none;border-color:#7c4dff;box-shadow:0 0 0 3px rgba(124,77,255,.12)}
.chat-send{background:var(--ai);color:#e8deff;border:none;border-radius:7px;padding:9px 16px;font-size:14px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;transition:all .15s}
.chat-send:hover:not(:disabled){background:#2a1454}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.crosscode-wrap{border:1.5px solid var(--brd2);border-radius:11px;background:var(--bg);margin-top:16px;padding:16px}
.crosscode-hdr{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#444;margin-bottom:12px}
.cc-btn{background:var(--sur);border:1.5px solid var(--brd2);border-radius:7px;padding:9px 16px;font-size:13px;color:#333;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:600;transition:all .15s}
.cc-btn:hover{border-color:var(--acc);color:var(--acc);background:#f0f4ff}
/* Key modal */
.key-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
.key-modal{background:#fff;border-radius:14px;padding:28px 32px;width:460px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.key-modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#111;margin-bottom:10px}
.key-modal-desc{font-size:13px;color:#555;line-height:1.65;margin-bottom:18px}
.key-input-row{display:flex;gap:8px;margin-bottom:12px}
.key-input{flex:1;border:1.5px solid var(--brd2);border-radius:7px;padding:10px 12px;font-size:13px;font-family:'IBM Plex Mono',monospace;color:#111}
.key-input:focus{outline:none;border-color:var(--acc)}
.key-save-btn{background:var(--acc);color:#fff;border:none;border-radius:7px;padding:10px 18px;font-size:13px;font-family:'Syne',sans-serif;font-weight:800;cursor:pointer}
.key-ok{font-size:12px;color:var(--grn);font-weight:600;padding:6px 0}

/* ═══════════════════════════ RELIABILITY β ═══════════════════════════ */
.mc-ctrl-box{background:#f0f4ff;border:1.5px solid rgba(38,86,184,.2);border-radius:9px;padding:14px;margin-bottom:16px}
.mc-ctrl-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px}
.mc-go-btn{width:100%;padding:12px;background:#1a0a3c;border:none;border-radius:9px;color:#e8deff;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:all .2s}
.mc-go-btn:hover:not(:disabled){background:#2a1454}
.mc-go-btn:disabled{opacity:.45;cursor:not-allowed}

/* β value card — no SVG, pure HTML */
.beta-card{background:var(--bg);border:2px solid;border-radius:12px;padding:20px 18px 14px;margin-bottom:14px;text-align:center}
.beta-main{display:flex;align-items:baseline;justify-content:center;gap:4px;margin-bottom:6px;line-height:1}
.beta-sym{font-family:Georgia,'Times New Roman',serif;font-size:42px;font-weight:700;background:none}
.beta-eq{font-family:'Syne',sans-serif;font-size:30px;font-weight:700;background:none}
.beta-num{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;letter-spacing:-2px;background:none}
.beta-status-txt{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin:0 0 14px;letter-spacing:.04em}
.beta-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.beta-stat{background:var(--sur);border:1.5px solid var(--brd);border-radius:9px;padding:11px 8px}
.bs-num{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:15px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.bs-lbl{font-size:11px;color:var(--mut);margin-top:5px;text-align:center;line-height:1.3}
.bs-lbl sub{font-size:9px;vertical-align:sub;line-height:0}

.mc-results{display:flex;flex-direction:column;gap:14px}
.mc-two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mc-chart-wrap{background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:14px;overflow:hidden}
.mc-chart-title{font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.mc-chart-note{font-size:11px;color:var(--mut);margin-top:6px;line-height:1.55;font-style:italic}
.mc-dist-wrap{background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:14px;overflow:hidden}
.mc-dist-table{width:100%;border-collapse:collapse;font-size:12px}
.mc-dist-table th{background:#1a0a3c;color:#e8deff;padding:7px 10px;text-align:left;font-family:'Syne',sans-serif;font-size:11px;font-weight:700}
.mc-dist-table td{padding:7px 10px;border-bottom:1px solid var(--brd);vertical-align:middle}
.mc-dist-table tr:nth-child(even) td{background:#faf7f0}
.dt-p{font-weight:600;color:#222;white-space:nowrap}
.dt-n{font-family:'IBM Plex Mono',monospace;color:#333;text-align:right;white-space:nowrap}
.dt-r{font-size:10px;color:var(--mut)}
.dist-badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;font-family:'Syne',sans-serif}
.dist-lognormal{background:#e8f0ff;color:#2656b8}
.dist-normal{background:#fff8e7;color:#a06000}
.dist-gumbel{background:#ffe8e8;color:#b52a1e}
.cov-inp{width:60px;padding:4px 6px;font-size:12px;border:1.5px solid var(--brd2);border-radius:5px;font-family:'IBM Plex Mono',monospace;text-align:right}
.mc-spin-msg{display:flex;align-items:center;justify-content:center;gap:12px;color:#555;font-size:14px;padding:32px 0}
.mc-interp{background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:16px}
.mc-interp-title{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#333;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.mc-interp p{font-size:13px;color:#333;line-height:1.75}
.ec0-wrap{border:1.5px solid var(--brd);border-radius:9px;overflow:hidden}
.ec0-head,.ec0-row{display:grid;grid-template-columns:55px 75px 55px 1fr 80px;align-items:center;padding:8px 14px}
.ec0-head{background:#1a0a3c;color:#e8deff;font-family:'Syne',sans-serif;font-size:11px;font-weight:700}
.ec0-head sub{font-size:9px;vertical-align:sub;line-height:0;opacity:.8}
.ec0-row{border-top:1px solid var(--brd);font-size:13px}
.ec0-row:nth-child(even){background:var(--bg)}
.ec0-hi{background:#edf7f3!important}
.ec0-bval{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#333}
.ec0-pfval{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#555}
.ec0-cc{font-weight:700;color:#444;font-size:12px}
.ec0-use{font-size:12px;color:#555;padding:0 6px}
.ec0-st{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;text-align:right;white-space:nowrap}
.ec0-st.ok{color:var(--grn)}.ec0-st.fail{color:var(--red)}
.mode-btn.active-rel{background:#1a0a3c!important;color:#e8deff!important}
.mode-btn.active-opt{background:#0a5c40!important;color:#fff!important}

/* ═══════════════════════════ OPTIMIZER ═══════════════════════════════ */
.opt-inputs-wrap{background:#f0fff8;border:1.5px solid rgba(10,122,95,.25);border-radius:9px;padding:14px;margin-bottom:18px}
.opt-goal-card{background:var(--bg);border:1.5px solid var(--brd);border-radius:10px;padding:16px;margin-bottom:16px}
.opt-goal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#222;margin-bottom:10px}
.opt-goal-body{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.opt-pill{background:#e8f5ee;border:1px solid rgba(10,122,95,.3);border-radius:99px;padding:4px 12px;font-size:12px;color:#0a5c40;font-weight:600}
.opt-pill sub{font-size:10px;vertical-align:sub;line-height:0}
.opt-run-btn{width:100%;padding:13px;background:var(--tel);border:none;border-radius:9px;color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:all .2s}
.opt-run-btn:hover:not(:disabled){background:#0a6b52;transform:translateY(-1px)}
.opt-run-btn:disabled{opacity:.45;cursor:not-allowed}
.opt-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.opt-stat{background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:12px;text-align:center}
.opt-stat-n{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:var(--txt)}
.opt-stat-l{font-size:11px;color:#555;margin-top:4px;font-weight:600}
.opt-chart-wrap{background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:14px;margin-bottom:14px}
.opt-chart-title{font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.opt-chart-note{font-size:11px;color:var(--mut);margin-top:6px;font-style:italic}
.opt-table-wrap{border:1.5px solid var(--brd);border-radius:9px;overflow:hidden;margin-bottom:14px}
.opt-table-title{background:#0a7a5f;color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.opt-count{background:rgba(255,255,255,.25);border-radius:99px;padding:2px 10px;font-size:11px}
.opt-table-scroll{overflow-x:auto}
.opt-table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
.opt-table th{background:#1a3a2a;color:#e8fef4;padding:7px 10px;text-align:right;font-family:'Syne',sans-serif;font-size:10px;font-weight:700}
.opt-table th:first-child,.opt-table td:first-child{text-align:center}
.opt-table td{padding:6px 10px;border-bottom:1px solid var(--brd);text-align:right;vertical-align:middle}
.opt-table tbody tr:hover{background:rgba(10,122,95,.06);cursor:pointer}
.opt-rank{font-family:'Syne',sans-serif;font-weight:800;color:var(--tel)}
.opt-grade{font-weight:700;color:#333}
.opt-mono{font-family:'IBM Plex Mono',monospace;color:#333}
.opt-dcr{font-family:'Syne',sans-serif;font-weight:700}
.opt-cost{font-family:'Syne',sans-serif;font-weight:800;color:#2656b8}
.opt-row-best td{background:rgba(10,122,95,.07)!important}
.opt-row-top td{background:rgba(10,122,95,.03)}
.opt-sel-card{background:var(--bg);border-top:2px solid var(--tel);padding:16px}
.opt-sel-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#222;margin-bottom:12px}
.opt-sel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.opt-sel-item{background:var(--sur);border:1.5px solid var(--brd);border-radius:8px;padding:10px;text-align:center}
.opt-sel-val{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#111}
.opt-sel-lbl{font-size:11px;color:var(--mut);margin-top:4px}
.opt-sel-lbl sub{font-size:9px;vertical-align:sub;line-height:0}
.opt-no-results{background:var(--rbg);border:1.5px solid rgba(181,42,30,.3);border-radius:9px;padding:28px;text-align:center;color:#333}
</style>

<script>// ── Rule helpers ─────────────────────────────────────────────────────────────
const P = (status, expl, fix, given, req) => ({
  status,
  explanation: expl,
  correction: fix,
  value_given: given,
  value_required: req
});
const ok = m => P('pass', m, null, null, null);
const fail = (m, f, g, r) => P('fail', m, f, g, r);
const warn = (m, f) => P('warning', m, f, null, null);

// ── Lookup tables ─────────────────────────────────────────────────────────────
const EC2_GRADES = {
  XC0: 12,
  XC1: 20,
  XC2: 25,
  XC3: 30,
  XC4: 30,
  XD1: 30,
  XD2: 35,
  XD3: 40,
  XS1: 30,
  XS2: 35,
  XS3: 40,
  XA1: 30,
  XA2: 35,
  XA3: 40
};
const EC2_CMIN = {
  XC0: 10,
  XC1: 15,
  XC2: 25,
  XC3: 30,
  XC4: 30,
  XD1: 35,
  XD2: 40,
  XD3: 45,
  XS1: 35,
  XS2: 40,
  XS3: 45,
  XA1: 25,
  XA2: 35,
  XA3: 45
};
const EC2_WC = {
  XC0: .70,
  XC1: .65,
  XC2: .60,
  XC3: .60,
  XC4: .60,
  XD1: .55,
  XD2: .50,
  XD3: .45,
  XS1: .55,
  XS2: .50,
  XS3: .45,
  XA1: .55,
  XA2: .50,
  XA3: .45
};
const BS_GRADE = {
  mild: 30,
  moderate: 35,
  severe: 40,
  'very severe': 45,
  extreme: 50
};
const BS_COVER = {
  mild: 25,
  moderate: 35,
  severe: 40,
  'very severe': 50,
  extreme: 60
};
const BS_WC = {
  mild: .65,
  moderate: .60,
  severe: .55,
  'very severe': .45,
  extreme: .45
};
function fctm(fck) {
  return fck <= 50 ? 0.30 * Math.pow(fck, 2 / 3) : 2.12 * Math.log(1 + fck / 10);
}

// ── All 88 rules ──────────────────────────────────────────────────────────────
const RULES = [
// === EC2 (24) ================================================================
{
  id: "EC2_load_combo",
  code: "EC2",
  group: "Load combinations",
  severity: "critical",
  ref: "EC2-1-1 §2.4.3",
  exc: "Persistent ULS: γG=1.35Gk + γQ=1.5Qk (Eq.6.10).",
  on: p => p.gamma_G != null || p.gamma_Q != null,
  chk: p => {
    const ok_ = (p.gamma_G || 0) >= 1.35 && (p.gamma_Q || 0) >= 1.5;
    return ok_ ? ok(`γG=${p.gamma_G}, γQ=${p.gamma_Q} ≥ 1.35/1.5 ✓`) : fail(`γG=${p.gamma_G ?? '-'}, γQ=${p.gamma_Q ?? '-'} below EC2 minimum.`, "Apply γG=1.35, γQ=1.5.", `γG=${p.gamma_G ?? '-'}, γQ=${p.gamma_Q ?? '-'}`, "γG≥1.35, γQ≥1.5");
  }
}, {
  id: "EC2_gamma_c",
  code: "EC2",
  group: "Material partial factors",
  severity: "critical",
  ref: "EC2-1-1 §2.4.2.4",
  exc: "γC=1.5 for concrete; γS=1.15 for steel (persistent/transient ULS).",
  on: p => p.gamma_c != null,
  chk: p => {
    const ok_ = p.gamma_c >= 1.5;
    return ok_ ? ok(`γC=${p.gamma_c} ≥ 1.5 ✓`) : fail(`γC=${p.gamma_c} < 1.5 minimum.`, "Use γC=1.5.", `γC=${p.gamma_c}`, "≥1.5");
  }
}, {
  id: "EC2_gamma_s",
  code: "EC2",
  group: "Material partial factors",
  severity: "critical",
  ref: "EC2-1-1 §2.4.2.4",
  exc: "γS=1.15 for reinforcing steel (persistent/transient ULS).",
  on: p => p.gamma_s != null,
  chk: p => {
    const ok_ = p.gamma_s >= 1.15;
    return ok_ ? ok(`γS=${p.gamma_s} ≥ 1.15 ✓`) : fail(`γS=${p.gamma_s} < 1.15.`, "Use γS=1.15.", `γS=${p.gamma_s}`, "≥1.15");
  }
}, {
  id: "EC2_min_grade",
  code: "EC2",
  group: "Minimum concrete grade",
  severity: "critical",
  ref: "EC2-1-1 §4.4.1.2 + Table E.1N",
  exc: "Minimum concrete class by exposure class (Table E.1N informative).",
  on: p => p.fck != null && p.exposure_class && EC2_GRADES[p.exposure_class.toUpperCase()],
  chk: p => {
    const e = p.exposure_class.toUpperCase(),
      min = EC2_GRADES[e];
    const ok_ = p.fck >= min;
    return ok_ ? ok(`fck=${p.fck} ≥ ${min} MPa ✓ for ${e}`) : fail(`fck=${p.fck} < ${min} MPa minimum for ${e}.`, `Use C${min}/${Math.round(min * 1.25)} or stronger.`, `fck=${p.fck} MPa`, `≥${min} MPa (C${min})`);
  }
}, {
  id: "EC2_cover",
  code: "EC2",
  group: "Cover (durability)",
  severity: "critical",
  ref: "EC2-1-1 §4.4.1.2–3",
  exc: "cnom=cmin,dur+Δcdev. cmin,dur from Table 4.4N. Δcdev=10mm recommended.",
  on: p => p.cover_nominal != null && p.exposure_class && EC2_CMIN[p.exposure_class.toUpperCase()],
  chk: p => {
    const e = p.exposure_class.toUpperCase(),
      life = p.design_life_years || 50;
    const adj = life >= 100 ? 10 : 0,
      cmin = EC2_CMIN[e] + adj,
      cnom = cmin + 10;
    const ok_ = p.cover_nominal >= cnom;
    return ok_ ? ok(`cnom=${p.cover_nominal} ≥ ${cnom} mm ✓ (${e}, ${life}yr)`) : fail(`cnom=${p.cover_nominal} < ${cnom} mm (cmin,dur=${cmin}mm + Δcdev=10mm${adj ? ` + ${adj}mm for ${life}yr` : ''}).`, `Increase cover to ≥ ${cnom} mm.`, `${p.cover_nominal} mm`, `≥${cnom} mm`);
  }
}, {
  id: "EC2_rho_min",
  code: "EC2",
  group: "Minimum reinforcement",
  severity: "critical",
  ref: "EC2-1-1 §9.2.1.1 Eq.(9.1N)",
  exc: "As,min=max(0.26fctm/fyk,0.0013)·bt·d.",
  on: p => p.rho != null && p.fyk != null,
  chk: p => {
    const fck = p.fck || (p.fcu ? p.fcu * .8 : 30),
      fm = fctm(fck),
      rmin = Math.max(.26 * fm / p.fyk, .0013);
    const ok_ = p.rho >= rmin;
    return ok_ ? ok(`ρ=${p.rho.toFixed(4)} ≥ ${rmin.toFixed(4)} ✓`) : fail(`ρ=${p.rho.toFixed(4)} < ρmin=${rmin.toFixed(4)} (fctm=${fm.toFixed(2)}, fyk=${p.fyk}).`, `Increase As so ρ ≥ ${rmin.toFixed(4)}.`, `ρ=${p.rho.toFixed(4)}`, `≥${rmin.toFixed(4)}`);
  }
}, {
  id: "EC2_rho_max",
  code: "EC2",
  group: "Maximum reinforcement",
  severity: "standard",
  ref: "EC2-1-1 §9.2.1.1",
  exc: "As,max=0.04Ac outside lap locations.",
  on: p => p.rho != null && !(p.structure_type || '').includes('column'),
  chk: p => {
    const ok_ = p.rho <= .04;
    return ok_ ? ok(`ρ=${p.rho.toFixed(4)} ≤ 4% ✓`) : fail(`ρ=${(p.rho * 100).toFixed(2)}% > 4% maximum outside laps.`, "Reduce steel or increase section.", `ρ=${(p.rho * 100).toFixed(2)}%`, "≤4%");
  }
}, {
  id: "EC2_rho_w_min",
  code: "EC2",
  group: "Shear reinforcement",
  severity: "critical",
  ref: "EC2-1-1 §9.2.2 Eq.(9.5N)",
  exc: "ρw,min=0.08√fck/fyk.",
  on: p => p.rho_shear != null && p.fck != null && p.fyk != null,
  chk: p => {
    const rmin = .08 * Math.sqrt(p.fck) / p.fyk;
    const ok_ = p.rho_shear >= rmin;
    return ok_ ? ok(`ρw=${p.rho_shear.toFixed(5)} ≥ ${rmin.toFixed(5)} ✓`) : fail(`ρw=${p.rho_shear.toFixed(5)} < ${rmin.toFixed(5)}.`, `Increase shear steel: ρw ≥ ${rmin.toFixed(5)}.`, `ρw=${p.rho_shear.toFixed(5)}`, `≥${rmin.toFixed(5)}`);
  }
}, {
  id: "EC2_stirrup_max",
  code: "EC2",
  group: "Shear reinforcement",
  severity: "critical",
  ref: "EC2-1-1 §9.2.2 Eq.(9.6N)",
  exc: "sl,max=min(0.75d, 600mm) for vertical links.",
  on: p => p.stirrup_spacing != null && p.d != null,
  chk: p => {
    const smax = Math.min(.75 * p.d, 600);
    const ok_ = p.stirrup_spacing <= smax;
    return ok_ ? ok(`s=${p.stirrup_spacing} ≤ ${smax} mm ✓`) : fail(`s=${p.stirrup_spacing} > ${smax} mm.`, `Reduce to ≤ ${smax} mm.`, `${p.stirrup_spacing} mm`, `≤${smax} mm`);
  }
}, {
  id: "EC2_bar_spacing",
  code: "EC2",
  group: "Bar spacing — minimum",
  severity: "standard",
  ref: "EC2-1-1 §8.2",
  exc: "Clear spacing ≥ max(k1·db, dg+k2, 20mm). k1=1, k2=5mm recommended.",
  on: p => p.bar_spacing_clear != null && p.db != null,
  chk: p => {
    const dg = p.aggregate_size || 20,
      smin = Math.max(p.db, dg + 5, 20);
    const ok_ = p.bar_spacing_clear >= smin;
    return ok_ ? ok(`Clear ${p.bar_spacing_clear} ≥ ${smin} mm ✓`) : fail(`Clear ${p.bar_spacing_clear} < ${smin} mm (=max(db,dg+5,20)).`, `Increase to ≥ ${smin} mm.`, `${p.bar_spacing_clear} mm`, `≥${smin} mm`);
  }
}, {
  id: "EC2_development",
  code: "EC2",
  group: "Development length",
  severity: "critical",
  ref: "EC2-1-1 §8.4.3",
  exc: "lb,rqd=(φ/4)·(σsd/fbd). fbd=2.25η1η2fctd. lbd=α×lb,rqd ≥ lb,min.",
  on: p => p.ld_specified != null && p.db != null && p.fyk != null,
  chk: p => {
    const fck = p.fck || (p.fcu ? p.fcu * .8 : 30),
      fm = fctm(fck),
      fbd = 2.25 * .7 * fm / 1.5;
    const lb = p.db / 4 * (p.fyk / 1.15) / fbd,
      lbd = Math.max(.7 * lb, 10 * p.db, 100);
    const ok_ = p.ld_specified >= lbd;
    return ok_ ? ok(`ld=${p.ld_specified} ≥ lbd=${Math.round(lbd)} mm ✓`) : fail(`ld=${p.ld_specified} < lbd=${Math.round(lbd)} mm (lb,rqd=${Math.round(lb)}mm, α=0.7).`, `Increase to ≥ ${Math.round(lbd)} mm.`, `${p.ld_specified} mm`, `≥${Math.round(lbd)} mm`);
  }
}, {
  id: "EC2_lap",
  code: "EC2",
  group: "Lap splice",
  severity: "critical",
  ref: "EC2-1-1 §8.7.3 Eq.(8.10)",
  exc: "l0=α1·α2·α3·α5·α6·lb,rqd ≥ l0,min. α6≈1.4 for ≤50% lapped.",
  on: p => p.l0_specified != null && p.db != null && p.fyk != null,
  chk: p => {
    const fck = p.fck || (p.fcu ? p.fcu * .8 : 30),
      fm = fctm(fck),
      fbd = 2.25 * .7 * fm / 1.5;
    const lb = p.db / 4 * (p.fyk / 1.15) / fbd,
      l0r = Math.max(1.4 * .7 * lb, .3 * 1.4 * lb, 15 * p.db, 200);
    const ok_ = p.l0_specified >= l0r;
    return ok_ ? ok(`l0=${p.l0_specified} ≥ ${Math.round(l0r)} mm ✓`) : fail(`l0=${p.l0_specified} < ${Math.round(l0r)} mm (α6=1.4).`, `Increase to ≥ ${Math.round(l0r)} mm.`, `${p.l0_specified} mm`, `≥${Math.round(l0r)} mm`);
  }
}, {
  id: "EC2_col_rho",
  code: "EC2",
  group: "Column reinforcement",
  severity: "critical",
  ref: "EC2-1-1 §9.5.2",
  exc: "As,min=max(0.10NEd/fyd,0.002Ac). As,max=0.04Ac.",
  on: p => p.rho_total != null && (p.structure_type || '').includes('column'),
  chk: p => {
    const rho = p.rho_total;
    if (rho < .002) return fail(`ρg=${(rho * 100).toFixed(3)}% < 0.2% minimum.`, "Increase to ≥0.2% Ac.", `${(rho * 100).toFixed(3)}%`, "≥0.2%");
    if (rho > .04) return fail(`ρg=${(rho * 100).toFixed(2)}% > 4% maximum.`, "Reduce or enlarge section.", `${(rho * 100).toFixed(2)}%`, "≤4%");
    return ok(`ρg=${(rho * 100).toFixed(2)}% within 0.2–4% ✓`);
  }
}, {
  id: "EC2_col_link",
  code: "EC2",
  group: "Column transverse reinforcement",
  severity: "critical",
  ref: "EC2-1-1 §9.5.3",
  exc: "Spacing ≤ min(20φl,min, min(b,h), 400mm). Link dia ≥ max(6mm,0.25φl,max).",
  on: p => p.link_spacing != null && p.db_main != null && p.b_col != null,
  chk: p => {
    const smax = Math.min(20 * p.db_main, p.b_col, 400);
    const ok_ = p.link_spacing <= smax;
    return ok_ ? ok(`Link spacing ${p.link_spacing} ≤ ${smax} mm ✓`) : fail(`Link ${p.link_spacing} > ${smax} mm (=min(20×${p.db_main},b=${p.b_col},400)).`, `Reduce to ≤ ${smax} mm.`, `${p.link_spacing} mm`, `≤${smax} mm`);
  }
}, {
  id: "EC2_slab_rho",
  code: "EC2",
  group: "Slab minimum reinforcement",
  severity: "critical",
  ref: "EC2-1-1 §9.3.1.1",
  exc: "Same formula as beams: As,min=max(0.26fctm/fyk,0.0013)·bt·d.",
  on: p => p.rho != null && p.fyk != null && (p.structure_type || '').includes('slab'),
  chk: p => {
    const fck = p.fck || (p.fcu ? p.fcu * .8 : 30),
      fm = fctm(fck),
      rmin = Math.max(.26 * fm / p.fyk, .0013);
    const ok_ = p.rho >= rmin;
    return ok_ ? ok(`ρ=${p.rho.toFixed(4)} ≥ ${rmin.toFixed(4)} ✓`) : fail(`ρ=${p.rho.toFixed(4)} < ${rmin.toFixed(4)}.`, `Increase to ρ ≥ ${rmin.toFixed(4)}.`, `ρ=${p.rho.toFixed(4)}`, `≥${rmin.toFixed(4)}`);
  }
}, {
  id: "EC2_slab_spacing",
  code: "EC2",
  group: "Slab bar spacing — maximum",
  severity: "standard",
  ref: "EC2-1-1 §9.3.1.1",
  exc: "Main bars ≤ min(3h,400mm). Secondary ≤ min(3.5h,450mm).",
  on: p => p.bar_spacing_slab != null && p.h_slab != null && (p.structure_type || '').includes('slab'),
  chk: p => {
    const smax = Math.min(3 * p.h_slab, 400);
    const ok_ = p.bar_spacing_slab <= smax;
    return ok_ ? ok(`Spacing ${p.bar_spacing_slab} ≤ ${smax} mm ✓`) : fail(`Spacing ${p.bar_spacing_slab} > ${smax} mm.`, `Reduce to ≤ ${smax} mm.`, `${p.bar_spacing_slab} mm`, `≤${smax} mm`);

  chk: p => {

}, {
  id: "JSCE_ductility",
  code: "JSCE",
  group: "Ductility — neutral axis",
  severity: "critical",
  ref: "JSCE-SSCS 2007 §7.2.1",
  exc: "xu/d ≤ 0.75×xb/d (balanced ratio). Ensures tension failure governs.",
  on: p => p.rho != null && p.fck != null && p.fyk != null && !(p.structure_type || '').includes('column'),
  chk: p => {
    const fcd = p.fck / (p.gamma_c || 1.3),
      fyd = p.fyk / (p.gamma_s || 1.0);
    const xd = p.rho * fyd / (.8 * fcd),
      esy = fyd / 200000,
      xb = .0035 / (.0035 + esy);
    const ok_ = xd <= .75 * xb;
    return ok_ ? ok(`xu/d=${xd.toFixed(3)} ≤ 0.75×xb/d=${(.75 * xb).toFixed(3)} ✓`) : fail(`xu/d=${xd.toFixed(3)} > ${(.75 * xb).toFixed(3)} (75% of balanced). Brittle failure risk.`, "Reduce ρ or increase fck.", `xu/d=${xd.toFixed(3)}`, `≤${(.75 * xb).toFixed(3)}`);

  id: "JSCE_rho_w_min",
  code: "JSCE",

}];

// ── Rule engine ───────────────────────────────────────────────────────────────
function runRules(params, codes) {
  const all = [];
  for (const rule of RULES) {
    if (!codes.includes(rule.code)) continue;
    try {
      if (!rule.on(params)) continue;
      const res = rule.chk(params);
      all.push({
        id: rule.id,
        code: rule.code,
        status: res.status,
        given: res.value_given,
        req: res.value_required,
        ref: rule.ref,
        exc: rule.exc,
        sev: rule.severity,
        expl: res.explanation,
        fix: res.correction,
        group: rule.group
      });
    } catch (e) {/* skip rules that throw on missing params */}
  }
  const seen = new Map();
  for (const r of all) {
    const key = r.id.replace(/^(EC2|ACI318|BS8110|JSCE)_/, '');
    const ex = seen.get(key);
    if (!ex || r.status === 'fail' && ex.status !== 'fail') seen.set(key, r);
  }
  return [...seen.values()];
}

// ═══════════════════════════════════════════════════════════════════════
// OPTION C — CAPACITY CALCULATION ENGINE
// All calculations return a structured object:
// { steps:[], result:{}, pass:bool, dcr:number }
// Each step: { label, formula, sub, value, unit }
// ═══════════════════════════════════════════════════════════════════════

const round = (v, n = 3) => Math.round(v * 10 ** n) / 10 ** n;
const sq = v => Math.sqrt(Math.max(0, v));
const clamp = (v, lo, hi) => Math.min(Math.max(v, lo), hi);
function step(label, formula, sub, value, unit = '') {
  return {
    label,
    formula,
    sub,
    value: round(value, 4),
    unit
  };
}
function calcDCR(demand, capacity) {
  return capacity > 0 ? round(demand / capacity, 3) : Infinity;
}

// ────────────────────────────────────────────────────────────────────
// EC2 BEAM FLEXURE  (EN 1992-1-1 §6.1)
// ────────────────────────────────────────────────────────────────────
function calcFlexure_EC2(p) {
  const {
    fck = 30,
    fyk = 500,
    gamma_c = 1.5,
    gamma_s = 1.15,
    b = 300,
    d = 400,
    rho = 0.012,
    MEd = 0
  } = p;
  const As = rho * b * d;
  const fcd = 0.85 * fck / gamma_c;
  const fyd = fyk / gamma_s;
  const a = As * fyd / (0.85 * fcd * b);
  const lam = fck <= 50 ? 0.8 : 0.8 - (fck - 50) / 400;
  const x = a / lam;
  const MRd = As * fyd * (d - a / 2) / 1e6; // kNm
  const xuD = x / d;
  const DCR = calcDCR(MEd, MRd);
  return {
    id: 'EC2_flexure',
    code: 'EC2',
    title: 'Flexural Capacity — EC2 §6.1',
    steps: [step('Steel area', 'As = ρ·b·d', `${rho}·${b}·${d}`, As, 'mm²'), step('Design concrete str.', 'fcd = 0.85·fck/γC', `0.85·${fck}/${gamma_c}`, fcd, 'N/mm²'), step('Design steel str.', 'fyd = fyk/γS', `${fyk}/${gamma_s}`, fyd, 'N/mm²'), step('Stress block depth', 'a = As·fyd/(0.85·fcd·b)', `${round(As)}·${round(fyd)}/(0.85·${round(fcd)}·${b})`, a, 'mm'), step('NA depth coeff.', 'λ = 0.8 (fck≤50)', 'λ = 0.8', lam, '—'), step('Neutral axis depth', 'x = a/λ', `${round(a, 2)}/${lam}`, x, 'mm'), step('Ductility check', 'xu/d', `${round(x, 1)}/${d}`, xuD, '≤0.45'), step('Moment capacity', 'MRd = As·fyd·(d−a/2)/10⁶', `${round(As)}·${round(fyd)}·(${d}−${round(a / 2, 1)})/10⁶`, MRd, 'kNm')],
    result: {
      MRd: round(MRd, 2),
      MEd,
      xuD: round(xuD, 3),
      As: round(As)
    },
    pass: MRd >= MEd && xuD <= 0.45,
    dcr: DCR,
    warn: xuD > 0.45 ? `Over-reinforced: xu/d=${round(xuD, 3)} > 0.45 — brittle failure` : null
  };
}

// ────────────────────────────────────────────────────────────────────
// ACI 318 BEAM FLEXURE  (§22.2 + §21.2)
// ────────────────────────────────────────────────────────────────────
function calcFlexure_ACI(p) {
  const {
    fc = 28,
    fy = 420,
    b = 300,
    d = 400,
    rho = 0.012,
    MEd = 0
  } = p;
  const As = rho * b * d;
  const b1 = clamp(0.85 - 0.05 * (fc - 28) / 7, 0.65, 0.85);
  const a = As * fy / (0.85 * fc * b);
  const c = a / b1;
  const et = (d - c) * 0.003 / c;
  const phi = et >= 0.005 ? 0.90 : et >= 0.002 ? 0.65 + (et - 0.002) * (0.25 / 0.003) : 0.65;
  const Mn = As * fy * (d - a / 2) / 1e6;
  const phiMn = phi * Mn;
  const DCR = calcDCR(MEd, phiMn);
  return {
    id: 'ACI_flexure',
    code: 'ACI318',
    title: 'Flexural Capacity — ACI 318M §22.2',
    steps: [step("Steel area", "As = ρ·b·d", `${rho}·${b}·${d}`, As, 'mm²'), step("Stress block factor", "β₁ (per §22.2.2.4.3)", `fc=${fc} → β₁=${round(b1, 3)}`, b1, '—'), step("Stress block depth", "a = As·fy/(0.85·f'c·b)", `${round(As)}·${fy}/(0.85·${fc}·${b})`, a, 'mm'), step("NA depth", "c = a/β₁", `${round(a, 1)}/${round(b1, 3)}`, c, 'mm'), step("Net tensile strain", "εt = (d−c)·0.003/c", `(${d}−${round(c, 1)})·0.003/${round(c, 1)}`, et, '≥0.004'), step("Strength red. factor", "φ (per εt)", `εt=${round(et, 4)} → φ=${round(phi, 3)}`, phi, '—'), step("Nominal moment cap.", "Mn = As·fy·(d−a/2)/10⁶", `${round(As)}·${fy}·(${d}−${round(a / 2, 1)})/10⁶`, Mn, 'kNm'), step("Design moment cap.", "φMn = φ·Mn", `${round(phi, 3)}·${round(Mn, 2)}`, phiMn, 'kNm')],
    result: {
      phiMn: round(phiMn, 2),
      Mn: round(Mn, 2),
      MEd,
      et: round(et, 4),
      phi: round(phi, 3),
      As: round(As)
    },
    pass: phiMn >= MEd && et >= 0.004,
    dcr: DCR,
    warn: et < 0.004 ? `Tension steel strain εt=${round(et, 4)} < 0.004 — section not permitted for beams` : null
  };
}

// ────────────────────────────────────────────────────────────────────
// BS 8110 BEAM FLEXURE  (§3.4.4)
// ────────────────────────────────────────────────────────────────────
function calcFlexure_BS8110(p) {
  const {
    fcu = 37,
    fy = 460,
    b = 300,
    d = 400,
    rho = 0.012,
    MEd = 0
  } = p;
  const As = rho * b * d;
  const K = MEd * 1e6 / (fcu * b * d * d);
  const Kp = 0.156;
  const z = d * clamp(0.5 + sq(0.25 - K / 0.9), 0.775, 0.95);
  const MRd = 0.87 * fy * As * z / 1e6;
  const DCR = calcDCR(MEd, MRd);
  return {
    id: 'BS_flexure',
    code: 'BS8110',
    title: 'Flexural Capacity — BS 8110-1 §3.4.4',
    steps: [step("Steel area", "As = ρ·b·d", `${rho}·${b}·${d}`, As, 'mm²'), step("Moment coeff. K", "K = MEd·10⁶/(fcu·b·d²)", `${MEd}·10⁶/(${fcu}·${b}·${d}²)`, K, '≤0.156'), step("K' (singly reinf.)", "K' = 0.156", "from Table 3.7", Kp, '—'), step("Lever arm z", "z = d[0.5+√(0.25−K/0.9)]", `${d}·[0.5+√(0.25−${round(K, 4)}/0.9)]`, z, 'mm'), step("Moment capacity", "MRd = 0.87·fy·As·z/10⁶", `0.87·${fy}·${round(As)}·${round(z, 1)}/10⁶`, MRd, 'kNm')],
    result: {
      MRd: round(MRd, 2),
      MEd,
      K: round(K, 4),
      z: round(z, 1),
      As: round(As)
    },
    pass: MRd >= MEd && K <= Kp,
    dcr: DCR,
    warn: K > Kp ? `K=${round(K, 4)} > K'=0.156 — compression steel required` : null
  };
}

// ────────────────────────────────────────────────────────────────────
// JSCE BEAM FLEXURE  (§7.2)
// ────────────────────────────────────────────────────────────────────
function calcFlexure_JSCE(p) {
  const {
    fck = 30,
    fyk = 345,
    gamma_c = 1.3,
    gamma_s = 1.0,
    gamma_b = 1.1,
    b = 300,
    d = 400,
    rho = 0.012,
    MEd = 0
  } = p;
  const As = rho * b * d;
  const fcd = fck / gamma_c;
  const fyd = fyk / gamma_s;
  const a = As * fyd / (0.85 * fcd * b);
  const Mud = As * fyd * (d - a / 2) / (gamma_b * 1e6);
  const DCR = calcDCR(MEd, Mud);
  return {
    id: 'JSCE_flexure',
    code: 'JSCE',
    title: 'Flexural Capacity — JSCE §7.2',
    steps: [step("Steel area", "As = ρ·b·d", `${rho}·${b}·${d}`, As, 'mm²'), step("Design concrete str.", "f'cd = fck/γc", `${fck}/${gamma_c}`, fcd, 'N/mm²'), step("Design steel str.", "fyd = fyk/γs", `${fyk}/${gamma_s}`, fyd, 'N/mm²'), step("Stress block depth", "a = As·fyd/(0.85·f'cd·b)", `${round(As)}·${round(fyd)}/(0.85·${round(fcd)}·${b})`, a, 'mm'), step("Design moment cap.", "Mud = As·fyd·(d−a/2)/(γb·10⁶)", `…/${gamma_b}·10⁶`, Mud, 'kNm')],
    result: {
      Mud: round(Mud, 2),
      MEd,
      As: round(As)
    },
    pass: Mud >= MEd,
    dcr: DCR,
    warn: null
  };
}

// ────────────────────────────────────────────────────────────────────
// EC2 SHEAR CAPACITY  (§6.2)
// ────────────────────────────────────────────────────────────────────
function calcShear_EC2(p) {
  const {
    fck = 30,
    fyk = 500,
    gamma_c = 1.5,
    gamma_s = 1.15,
    b = 300,
    d = 400,
    rho = 0.012,
    rho_shear = 0.001,
    stirrup_spacing = 150,
    VEd = 0

  const As = rho * bw * d;

  const fcd = 0.85 * fck / gamma_c;

  const fywdk = Math.min(fyk / gamma_s, 435);

  const cotT = 2.5; // θ=21.8° (minimum inclination)
  const nu1 = 0.6 * (1 - fck / 250);
  const VRdmax = bw * z * nu1 * fcd / (cotT + 1 / cotT) / 1e3; // kN
  // Asw/s from rho_shear
  const AswS = rho_shear * bw; // mm²/mm
  const VRds = AswS * z * fywdk * cotT / 1e3; // kN
  const VRd = Math.min(VRds + VRdc, VRdmax);
  const DCR = calcDCR(VEd, VRd);
  return {
    id: 'EC2_shear',
    code: 'EC2',
    title: 'Shear Capacity — EC2 §6.2',
    steps: [step("Scale factor k", "k = 1+√(200/d) ≤ 2.0", `1+√(200/${d})`, k, '—'), step("Long. reinf. ratio", "ρ₁ = As/(bw·d) ≤ 0.02", `${round(As)}/(${bw}·${d})`, r1, '—'), step("Concrete shear (vRd,c)", "[0.18/γC]·k·(100ρ₁fck)^⅓", "…", vRdc, 'N/mm²'), step("Min. concrete shear", "vmin = 0.035·k^1.5·√fck", `0.035·${round(k, 3)}^1.5·√${fck}`, vmin, 'N/mm²'), step("VRd,c (concrete)", "max(vRd,c,vmin)·bw·d", `max(${round(vRdc, 3)},${round(vmin, 3)})·${bw}·${d}/10³`, VRdc, 'kN'), step("Design stirrup str.", "fywd = fyk/γS ≤ 435", `${fyk}/${gamma_s}`, fywdk, 'N/mm²'), step("ν₁ crushing factor", "ν₁ = 0.6(1−fck/250)", `0.6·(1−${fck}/250)`, nu1, '—'), step("VRd,max (crushing)", "bw·z·ν₁·fcd/(cotθ+tanθ)", `cot θ=${cotT}`, VRdmax, 'kN'), step("Asw/s", "ρw·bw", `${rho_shear}·${bw}`, round(AswS, 3), 'mm²/mm'), step("VRd,s (link capacity)", "(Asw/s)·z·fywd·cotθ", `${round(AswS, 3)}·${round(z)}·${round(fywdk)}·${cotT}`, VRds, 'kN'), step("Design shear capacity", "min(VRd,s+VRd,c, VRd,max)", `min(${round(VRds + VRdc, 1)},${round(VRdmax, 1)})`, VRd, 'kN')],
    result: {
      VRd: round(VRd, 2),
      VEd,
      VRdc: round(VRdc, 2),
      VRds: round(VRds, 2),
      VRdmax: round(VRdmax, 2)
    },
    pass: VRd >= VEd,
    dcr: DCR,
    warn: VEd > VRdmax ? `VEd=${VEd}kN exceeds VRd,max=${round(VRdmax, 1)}kN — concrete crushing governs; increase section or fck` : null
  };
}

// ────────────────────────────────────────────────────────────────────
// ACI 318 SHEAR  (§22.5)
// ────────────────────────────────────────────────────────────────────
function calcShear_ACI(p) {
  const {
    fc = 28,
    fy = 420,
    b = 300,
    d = 400,
    rho = 0.012,
    rho_shear = 0.001,
    stirrup_spacing = 150,
    VEd = 0
  } = p;
  const As = rho * b * d;
  const lam = 1.0; // normal weight concrete
  const Vc = 0.17 * lam * sq(fc) * b * d / 1e3;
  const Av = rho_shear * b * stirrup_spacing; // mm²
  const Vs = Av * fy * d / (stirrup_spacing * 1e3);
  const Vn = Vc + Vs;
  const phiVn = 0.75 * Vn;
  const DCR = calcDCR(VEd, phiVn);
  return {
    id: 'ACI_shear',
    code: 'ACI318',
    title: 'Shear Capacity — ACI 318M §22.5',
    steps: [step("Vc (concrete)", "0.17·λ·√f'c·bw·d", `0.17·1.0·√${fc}·${b}·${d}/10³`, Vc, 'kN'), step("Av per stirrup", "ρw·b·s", `${rho_shear}·${b}·${stirrup_spacing}`, Av, 'mm²'), step("Vs (steel)", "Av·fyt·d/s", `${round(Av)}·${fy}·${d}/${stirrup_spacing}/10³`, Vs, 'kN'), step("Vn", "Vc + Vs", `${round(Vc, 1)}+${round(Vs, 1)}`, Vn, 'kN'), step("φVn", "0.75·Vn", `0.75·${round(Vn, 1)}`, phiVn, 'kN')],
    result: {
      phiVn: round(phiVn, 2),
      Vc: round(Vc, 2),
      Vs: round(Vs, 2),
      VEd
    },
    pass: phiVn >= VEd,
    dcr: DCR,
    warn: null
  };
}

// ────────────────────────────────────────────────────────────────────
// N-M INTERACTION DIAGRAM  (EC2 §6.1 — strain compatibility)
// Returns array of {N,M} points for the interaction envelope
// ────────────────────────────────────────────────────────────────────
function calcNM_EC2(p) {
  const {
    fck = 30,
    fyk = 500,
    gamma_c = 1.5,
    gamma_s = 1.15,
    b = 400,
    d = 400,
    rho_total = 0.02,
    cover = 40,
    NEd = 0,
    MEd = 0
  } = p;
  const h = d + cover + 10; // approximate total depth
  const dp = cover + 10; // cover to compression steel centroid
  const As1 = rho_total * b * h / 2; // symmetric section
  const As2 = As1;
  const fcd = 0.85 * fck / gamma_c;
  const fyd = fyk / gamma_s;
  const Es = 200000;
  const ecu = 0.0035;
  const ey = fyd / Es;
  const pts = [];
  // Sweep x from tiny (pure bending zone) to h (pure compression zone)
  const xVals = [];
  for (let i = 0; i <= 60; i++) xVals.push(0.001 * h + i * (1.5 * h) / 60);
  for (const x of xVals) {
    const es1 = ecu * (x - dp) / x; // compression steel strain
    const es2 = ecu * (d - x) / x; // tension steel strain (negative = tension)
    const ss1 = clamp(es1 * Es, -fyd, fyd); // compression steel stress
    const ss2 = clamp(es2 * Es, -fyd, fyd); // tension steel stress (negative = tension)
    const xeff = clamp(x, 0, h);
    const Cc = 0.8 * xeff * b * fcd; // concrete compression force (N)
    const Cs = As1 * ss1; // compression steel force
    const Ts = As2 * ss2; // tension steel force (negative when tension)
    const N = (Cc + Cs + Ts) / 1e3; // kN (positive = compression)
    const M = (Cc * (h / 2 - 0.4 * xeff) + Cs * (h / 2 - dp) - Ts * (d - h / 2)) / 1e6; // kNm
    if (M >= 0) pts.push({
      N: round(N, 1),
      M: round(M, 1)
    });
  }

  // Pure tension point
  pts.push({
    N: round(-(As1 + As2) * fyd / 1e3, 1),
    M: 0
  });
  // Pure compression
  const N0 = (b * h * fcd + (As1 + As2) * fyd) / 1e3;
  pts.unshift({
    N: round(N0, 1),
    M: 0
  });
  const onCurve = checkInsideNM(pts, NEd, MEd);
  return {
    id: 'EC2_NM',
    code: 'EC2',
    title: 'N-M Interaction — EC2 §6.1 (Strain compatibility)',
    points: pts,
    design: {
      NEd,
      MEd
    },
    inside: onCurve,
    params: {
      h: round(h),
      b,
      As1: round(As1),
      As2: round(As2),
      fcd: round(fcd, 2),
      fyd: round(fyd, 1)
    },
    pass: onCurve,
    dcr: null,
    steps: [step("Total depth (est.)", "h ≈ d + c + 10", `${d}+${cover}+10`, h, 'mm'), step("Steel each face", "As1=As2=ρg·b·h/2", `${rho_total}·${b}·${h}/2`, As1, 'mm²'), step("Design concrete", "fcd = 0.85·fck/γC", `0.85·${fck}/${gamma_c}`, fcd, 'N/mm²'), step("Design steel", "fyd = fyk/γS", `${fyk}/${gamma_s}`, fyd, 'N/mm²'), step("Curve points", "Sweep x: 0 → 1.5h", "60 points, strain compatibility", pts.length, 'pts')]
  };
}

// Check if design point (NEd,MEd) is inside the N-M envelope
function checkInsideNM(pts, NEd, MEd) {
  // For each N, find max M on curve; check if MEd ≤ that max M
  if (!pts.length) return false;
  // Find two adjacent points that bracket NEd
  const sorted = [...pts].sort((a, b) => a.N - b.N);
  for (let i = 0; i < sorted.length - 1; i++) {
    const lo = sorted[i],
      hi = sorted[i + 1];
    if (NEd >= lo.N && NEd <= hi.N) {
      const t = (NEd - lo.N) / (hi.N - lo.N);
      const Mlim = lo.M + t * (hi.M - lo.M);
      return MEd <= Mlim;
    }
  }
  return false;
}

// ────────────────────────────────────────────────────────────────────
// DEFLECTION — EC2 simplified (§7.4.2)
// ────────────────────────────────────────────────────────────────────
function calcDeflection_EC2(p) {
  const {
    fck = 30,
    fyk = 500,
    gamma_c = 1.5,
    gamma_s = 1.15,
    b = 300,
    d = 400,
    rho = 0.012,
    span = 5000,
    w_kN_m = 20
  } = p;
  const h = d + 60;
  const Es = 200000;
  const Ec = 22000 * Math.pow(fck / 10, 0.3);
  const As = rho * b * d;
  const Ig = b * h ** 3 / 12;
  const n = Es / Ec;
  // Cracked moment of inertia (simplified, tension steel only, neglect compression steel)
  const kd = (-n * As + sq((n * As) ** 2 + 2 * b * n * As * d)) / b; // NA depth in cracked section
  const Icr = b * kd ** 3 / 3 + n * As * (d - kd) ** 2;
  // Branson-style effective I (simplified, not exact EC2 but gives good estimate)
  const fctm = 0.30 * Math.pow(fck, 2 / 3);
  const Mcr = fctm * Ig / (h / 2) / 1e6; // kNm
  const Mmax = w_kN_m * (span / 1e3) ** 2 / 8; // kNm simply supported
  const zeta = Math.max(0, 1 - 0.5 * (Mcr / Mmax) ** 2);
  const Ieff = 1 / (zeta / Icr + (1 - zeta) / Ig);
  const EI = Ec * Ieff;
  // Simply supported: δ = 5wL⁴/(384EI)
  const w_N_mm = w_kN_m; // N/mm = kN/m
  const L = span; // mm
  const delta = 5 * w_N_mm * L ** 4 / (384 * EI); // mm
  const lim = span / 250; // EC2 §7.4.1: δ ≤ L/250

  return {
    id: 'EC2_defl',
    code: 'EC2',
    title: 'Deflection — EC2 §7.4 (Simplified)',
    steps: [step("Elastic concrete mod.", "Ecm = 22000·(fck/10)^0.3", `22000·(${fck}/10)^0.3`, Ec, 'N/mm²'), step("Gross inertia", "Ig = b·h³/12", `${b}·${h}³/12`, Ig, 'mm⁴'), step("NA depth (cracked)", "kd = [−nAs+√((nAs)²+2b·nAs·d)]/b", "strain compatibility", kd, 'mm'), step("Cracked inertia", "Icr = b·kd³/3+n·As·(d−kd)²", "", Icr, 'mm⁴'), step("Cracking moment", "Mcr = fctm·Ig/(h/2)/10⁶", `fctm=${round(fctm, 2)}`, Mcr, 'kNm'), step("Applied moment", "Mmax = w·L²/8", `${w_kN_m}·(${span / 1e3})²/8`, Mmax, 'kNm'), step("Cracking coefficient", "ζ = 1−0.5·(Mcr/Mmax)²", `1−0.5·(${round(Mcr, 1)}/${round(Mmax, 1)})²`, zeta, '—'), step("Effective inertia", "1/Ie = ζ/Icr+(1−ζ)/Ig", "", Ieff, 'mm⁴'), step("Deflection δ", "5w·L⁴/(384·Ec·Ie)", `5·${w_kN_m}·${span}⁴/…`, round(delta, 2), 'mm'), step("Limit δ ≤ L/250", "L/250", `${span}/250`, lim, 'mm')],
    result: {
      delta: round(delta, 2),
      limit: round(lim, 2),
      Mcr: round(Mcr, 1),
      Mmax: round(Mmax, 1)
    },
    pass: delta <= lim,
    dcr: calcDCR(delta, lim),
    warn: delta > lim ? `δ=${round(delta, 1)}mm > L/250=${round(lim, 1)}mm — increase depth or reduce span` : null
  };
}

// ────────────────────────────────────────────────────────────────────
// MASTER RUNNER
// ────────────────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
// DIRECTION 1 — PROBABILISTIC SAFETY ASSESSMENT (Reliability Index β)
// Monte Carlo simulation with JCSS-based parameter distributions
// Reference: JCSS Probabilistic Model Code (2001), EN 1990 Annex C
// ═══════════════════════════════════════════════════════════════════════════════

// ── Random samplers ────────────────────────────────────────────────────────────
function _randN() {                              // N(0,1) — Box-Muller
  let u;
  do { u = Math.random(); } while(u === 0);
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * Math.random());
}
function mcSampleNormal(mean, std) {
  return mean + std * _randN();
}
function mcSampleLognormal(mean, cov) {          // parameterised by mean & CoV
  const v    = cov * cov;
  const sigL = Math.sqrt(Math.log(1 + v));
  const muL  = Math.log(mean) - sigL * sigL / 2;
  return Math.exp(muL + sigL * _randN());
}
function mcSampleGumbel(mean, cov) {             // Gumbel max (variable loads)
  const std   = mean * cov;
  const alpha = Math.PI / (std * Math.sqrt(6));
  const u     = mean - 0.5772156649 / alpha;
  const r     = Math.random() || 1e-15;
  return u - Math.log(-Math.log(r)) / alpha;
}

// ── Normal inverse CDF Φ⁻¹(p) — Rational approx (Beasley-Springer-Moro) ──────
function normInvCDF(p) {
  if (p <= 0) return -8;
  if (p >= 1) return  8;
  const flip = p < 0.5;
  const q    = flip ? p : 1 - p;
  const t    = Math.sqrt(-2 * Math.log(q));
  const c0 = 2.515517, c1 = 0.802853, c2 = 0.010328;
  const d1 = 1.432788, d2 = 0.189269, d3 = 0.001308;
  const x = t - (c0 + c1*t + c2*t*t) / (1 + d1*t + d2*t*t + d3*t*t*t);
  return flip ? -x : x;
}
function reliabilityBeta(pf) {
  if (pf <= 0)    return 8.0;
  if (pf >= 0.99) return normInvCDF(0.01);
  return -normInvCDF(pf);           // β = Φ⁻¹(1−Pf) = −Φ⁻¹(Pf)
}

// ── Default distributions (JCSS Probabilistic Model Code §2.1, §2.3) ──────────
function getDefaultDists(p) {
  const fck  = p.fck  || p.fc   || 30;
  const fyk  = p.fyk  || p.fy   || 500;
  const dNom = p.d    || 400;
  const bNom = p.b    || 300;
  const cNom = p.cover_nominal || 30;
  const gC   = p.gamma_c || 1.5;
  const gS   = p.gamma_s || 1.15;

  // Concrete: characteristic fck is the 5th-percentile
  // Mean from EN 1992-1-1 §3.1.2: fcm = fck + 8 MPa (28-day)
  const fcm  = fck + 8;
  // Steel: bias ~1.10 over characteristic (JCSS §2.3.1)
  const fym  = fyk * 1.10;

  return {
    fck:  { dist:'lognormal', mean:fcm,  cov:0.15,   label:'Concrete f_cm',   unit:'N/mm²', editable:true  },
    fyk:  { dist:'lognormal', mean:fym,  cov:0.06,   label:'Steel f_ym',      unit:'N/mm²', editable:true  },
    d:    { dist:'normal',    mean:dNom, std:10,      label:'Eff. depth d',    unit:'mm',    editable:true  },
    b:    { dist:'normal',    mean:bNom, std:5,       label:'Width b',         unit:'mm',    editable:true  },
    cover:{ dist:'normal',    mean:cNom, std:8,       label:'Cover c',         unit:'mm',    editable:true  },
    ME:   { dist:'lognormal', mean:Math.max((p.MEd||0)/1.40, 1), cov:0.20,
            label:'Applied M_E',   unit:'kNm', editable:true  },
    VE:   { dist:'gumbel',   mean:Math.max((p.VEd||0)/1.50, 1), cov:0.25,
            label:'Applied V_E',   unit:'kN',  editable:true  },
  };
}

// ── Sample one realisation ─────────────────────────────────────────────────────
function mcSample(dists) {
  const s = {};
  for (const [k, d] of Object.entries(dists)) {
    let v;
    if      (d.dist === 'lognormal') v = mcSampleLognormal(d.mean, d.cov);
    else if (d.dist === 'gumbel')    v = mcSampleGumbel(d.mean, d.cov);
    else                             v = mcSampleNormal(d.mean, d.std || d.mean * d.cov);
    s[k] = Math.max(v, d.mean * 0.01); // hard floor
  }
  return s;
}

// ── Limit state functions ──────────────────────────────────────────────────────
function lsFlexure(s, base) {
  // EC2-style capacity with sampled parameters
  const As  = (base.rho || 0.012) * s.b * s.d;
  const gC  = base.gamma_c || 1.5;
  const fcd = 0.85 * s.fck / gC;                     // design (sampled fck)
  const a   = As * s.fyk / (0.85 * fcd * s.b);       // stress block depth
  const MR  = As * s.fyk * (s.d - a / 2) / 1e6;     // kNm
  return { g: MR - s.ME, MR, ME: s.ME };
}

function lsShear(s, base) {
  const bw  = s.b;
  const As  = (base.rho || 0.012) * bw * s.d;
  const r1  = Math.min(As / (bw * s.d), 0.02);
  const k   = Math.min(1 + Math.sqrt(200 / s.d), 2.0);
  const gC  = base.gamma_c || 1.5;
  const vRdc= (0.18 / gC) * k * Math.pow(100 * r1 * s.fck, 1/3);
  const vmin= 0.035 * Math.pow(k, 1.5) * Math.sqrt(s.fck);
  const VRdc= Math.max(vRdc, vmin) * bw * s.d / 1e3;
  // links
  const rhoW = base.rho_shear || 0.001;
  const z    = 0.9 * s.d;
  const fywd = Math.min(s.fyk / (base.gamma_s || 1.15), 435);
  const VRds = rhoW * bw * z * fywd * 2.5 / 1e3;    // cotθ=2.5
  const VR   = VRdc + VRds;
  return { g: VR - s.VE, VR, VE: s.VE };
}

// ── FOSM sensitivity: importance factor αᵢ (normalised) ─────────────────────
function fosm(base, dists, lsFn) {
  const s0 = {};
  for (const [k, d] of Object.entries(dists)) s0[k] = d.mean;
  const g0 = lsFn(s0, base).g;
  const sens = {};
  for (const [k, d] of Object.entries(dists)) {
    const sigma  = d.std || (d.mean * d.cov);
    const delta  = sigma * 0.01;
    const sPlus  = { ...s0, [k]: s0[k] + delta };
    const dg_dxi = (lsFn(sPlus, base).g - g0) / delta;
    sens[k]      = Math.abs(dg_dxi * sigma);
  }
  const total = Math.sqrt(Object.values(sens).reduce((s, v) => s + v * v, 0));
  return Object.fromEntries(
    Object.entries(sens)
      .map(([k, v]) => [k, total > 0 ? v / total : 0])
      .sort((a, b) => b[1] - a[1])
  );
}

// ── Main Monte Carlo runner ────────────────────────────────────────────────────
function runMonteCarlo(params, dists, N = 10000, limitState = 'flexure') {
  const lsFn = limitState === 'shear' ? lsShear : lsFlexure;
  let fails = 0;
  const gArr = [], rArr = [], eArr = [];
  const HIST = Math.min(N, 3000);  // store for histogram

  for (let i = 0; i < N; i++) {
    const s    = mcSample(dists);
    const { g, MR, ME, VR, VE } = lsFn(s, params);
    if (g < 0) fails++;
    if (i < HIST) {
      gArr.push(g);
      rArr.push(MR || VR || 0);
      eArr.push(ME || VE || 0);
    }
  }

  const pf      = fails / N;
  const pfAdj   = Math.max(pf, 0.5 / N);          // avoid β=∞ when pf=0
  const beta    = reliabilityBeta(pfAdj);
  const pfZero  = pf === 0;
  const alpha   = fosm(params, dists, lsFn);

  return {
    N, fails, pf, pfZero, beta,
    gArr, rArr, eArr,
    alpha, dists,
    limitState,
  };
}


// ═══════════════════════════════════════════════════════════════════════
// DIRECTION 2 — INVERSE DESIGN OPTIMIZER
// Given loads + constraints → ranked list of feasible designs
// All 89 rules + capacity checks run on every candidate
// ═══════════════════════════════════════════════════════════════════════

// Concrete grades available for optimization
const OPT_GRADES = [
  {fck:25,fcu:31},{fck:30,fcu:37},{fck:35,fcu:44},
  {fck:40,fcu:50},{fck:45,fcu:56},{fck:50,fcu:62},
];

// ── Cost model ────────────────────────────────────────────────────────
// Costs per metre run of beam:
//   concrete_vol = b × h × 1.0 m³/m
//   steel_vol    = rho × b × d × 1.0 m (density 7850 kg/m³)
function beamCostPerMetre(b, h, d, rho, cp) {
  const concVol  = (b/1000) * (h/1000);           // m²  per m run
  const steelMass= rho * (b/1000) * (d/1000) * 7850; // kg per m run
  return concVol * cp.concrete + steelMass * cp.steel;
}

// ── Build a full params object for a candidate ─────────────────────────
function buildCandidate(b, h, fck, rho, loads, constraints, codes) {
  const cover  = constraints.cover  || 30;
  const fyk    = constraints.fyk    || 500;
  const gamma_c = 1.5, gamma_s = 1.15;
  const d      = h - cover - 10;  // approx effective depth (link 8mm + bar radius ~10)
  const gG = codes.includes('BS8110') ? 1.4 : 1.35;
  const gQ = 1.5;

  return {
    fck, fcu: Math.round(fck*1.25),
    fc: fck, fy: fyk,
    fyk, gamma_c, gamma_s,
    b, d, h,
    cover_nominal: cover,
    exposure_class: constraints.exposure || 'XC1',
    design_life_years: constraints.life  || 50,
    rho,
    rho_shear:    constraints.rhoW || Math.max(0.08*Math.sqrt(fck)/fyk, 0.001),
    stirrup_spacing: constraints.stirrup || Math.min(0.75*d, 400),
    gamma_G: gG, gamma_Q: gQ,
    MEd: loads.MEd || 0,
    VEd: loads.VEd || 0,
    w_c_ratio: constraints.wc || 0.55,
    structure_type: 'beam',
  };
}

// ── Main optimizer ─────────────────────────────────────────────────────
function runOptimizer(loads, constraints, codes, costParams) {
  const results = [];

  // Parameter grid
  const bOpts   = [];
  for (let b = constraints.bMin; b <= constraints.bMax; b += constraints.bStep || 50) bOpts.push(b);

  const hOpts   = [];
  for (let h = constraints.hMin; h <= constraints.hMax; h += constraints.hStep || 50) hOpts.push(h);

  const rhoOpts = [0.005,0.006,0.007,0.008,0.010,0.012,0.015,0.018,0.020,0.025,0.030];

  const gradeOpts = OPT_GRADES.filter(g =>
    g.fck >= (constraints.fckMin || 25) && g.fck <= (constraints.fckMax || 50)
  );

  let total = 0, failCap = 0, failDuct = 0, failRule = 0;
  const maxResults = 200;

  for (const gr of gradeOpts) {
    for (const b of bOpts) {
      for (const h of hOpts) {
        total++;
        if (h < b * 0.6) continue; // skip pancake sections
        for (const rho of rhoOpts) {
          const params = buildCandidate(b, h, gr.fck, rho, loads, constraints, codes);
          if (params.d <= 0) continue;

          // ── 1. Capacity checks ────────────────────────────────────────
          let flexOK = true, shearOK = true, MRd = 0, VRd = 0, flexDCR = 0, shearDCR = 0;
          let flexResult = null, shearResult = null;

          if (loads.MEd > 0) {
            flexResult = codes.includes('EC2')
              ? calcFlexure_EC2(params)
              : codes.includes('ACI318') ? calcFlexure_ACI({...params, fc:gr.fck, fy:params.fyk})
              : calcFlexure_EC2(params);
            flexOK  = flexResult.pass;
            MRd     = flexResult.result.MRd || flexResult.result.phiMn || flexResult.result.Mud || 0;
            flexDCR = flexResult.dcr || 0;
          }

          if (loads.VEd > 0) {
            shearResult = codes.includes('EC2')
              ? calcShear_EC2(params)
              : codes.includes('ACI318') ? calcShear_ACI({...params, fc:gr.fck, fy:params.fyk})
              : calcShear_EC2(params);
            shearOK  = shearResult.pass;
            VRd      = shearResult.result.VRd || shearResult.result.phiVn || 0;
            shearDCR = shearResult.dcr || 0;
          }

          // Skip if capacity fails
          if (loads.MEd > 0 && !flexOK) {
            if (flexResult && flexResult.result && flexResult.result.xuD > 0.45) failDuct++;
            else failCap++;
            continue;
          }
          if (loads.VEd > 0 && !shearOK) { failCap++; continue; }

          // ── 2. Rule checks (critical rules only for speed) ────────────
          // Use primary code only for optimizer rules — multi-code rule conflicts are checked in Parameter Check tab
          const primaryCode = codes.includes('EC2') ? 'EC2' : codes.includes('ACI318') ? 'ACI318' : codes[0];
          const keyRules = RULES.filter(r => r.severity === 'critical' && r.code === primaryCode);
          let ruleFailCount = 0;
          for (const rule of keyRules) {
            try {
              if (!rule.on(params)) continue;
              const res = rule.chk(params);
              if (res.status === 'fail') ruleFailCount++;
            } catch(e) { /* skip */ }
          }
          if (ruleFailCount > 0) { failRule++; continue; }

          // ── 3. Cost ───────────────────────────────────────────────────
          const costPerM = beamCostPerMetre(b, h, params.d, rho, costParams);
          const As       = rho * b * params.d;

          results.push({
            b, h, d: params.d, fck: gr.fck, rho, As: Math.round(As),
            MRd: Math.round(MRd * 10) / 10,
            VRd: Math.round(VRd * 10) / 10,
            flexDCR: Math.round(flexDCR * 1000) / 1000,
            shearDCR: Math.round(shearDCR * 1000) / 1000,
            costPerM: Math.round(costPerM * 100) / 100,
            concreteVol: Math.round(b/1000 * h/1000 * 10000) / 10000,
            steelMass:   Math.round(rho * b/1000 * params.d/1000 * 7850 * 10) / 10,
            grade: `C${gr.fck}/${Math.round(gr.fck*1.25)}`,
          });

          // Trim to avoid excessive memory use
          if (results.length > maxResults * 3) {
            results.sort((a,b) => a.costPerM - b.costPerM);
            results.splice(maxResults);
          }
        }
      }
    }
  }

  // Final sort: by cost ascending
  results.sort((a, b) => a.costPerM - b.costPerM);
  const feasible = results.length;

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));

}
